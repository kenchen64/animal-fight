<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">

    <title>Animal Brawl</title>
    <style>
      html, body, #game-container {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        user-select: none;
        touch-action: none; /* 關鍵：禁用瀏覽器預設觸控手勢，防止畫面亂滾 */
      }

      /* 📌 新增：單獨給搖桿使用的全螢幕/透明層，確保觸控不會與遊戲畫布衝突 */
      #joystick-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 300px;  /* 限制搖桿的可觸控範圍在左下角區域 */
        height: 300px;
        z-index: 10;   /* 確保疊在 Phaser 遊戲畫布的最上方 */
        pointer-events: auto; /* 開啟觸控事件 */
      }
    </style>
  </head>

  <body>
    <!-- 遊戲畫布容器 -->
    <div id="game-container"></div>

    <!-- 📌 新增：獨立的搖桿容器 -->
    <div id="joystick-container"></div>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
