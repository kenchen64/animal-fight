<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">

    <title>Animal Brawl</title>
    <style>

/* 📌 當手機處於「直向 (Portrait)」時的強制旋轉防護 */
@media screen and (orientation: portrait) {
  #game-container {
    transform: rotate(90deg);
    transform-origin: bottom left;
    position: absolute;
    top: -100vw;
    left: 0;
    width: 100vh;
    height: 100vw;
  }
  
  /* 搖桿容器也要跟著旋轉或重新定位 */
  #joystick-container {
    transform: rotate(90deg);
    /* 根據旋轉後的視窗重新定位你的搖桿 */
  }
}

      /* 📌 新增：單獨給搖桿使用的全螢幕/透明層，確保觸控不會與遊戲畫布衝突 */
      #joystick-container {
        position: absolute;
        bottom: 30px;
        left: 30px;
        width: 150px;  /* 限制搖桿的可觸控範圍在左下角區域 */
        height: 150px;
        z-index: 10;   /* 確保疊在 Phaser 遊戲畫布的最上方 */
        pointer-events: auto; /* 開啟觸控事件 */
      }
    </style>
  </head>

  <body>
    <!-- 遊戲畫布容器 -->
    <div id="game-container"></div>

    <!-- 📌 新增：獨立的搖桿容器 -->
    <div id="joystick-container"></div>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
